name: Distribute (Dev)

on:
  push:
    branches: [develop]

jobs:
  # ─────────────────────────────────────────────
  # Android → Google Play Internal Track
  # Required secrets:
  #   ANDROID_KEYSTORE_BASE64        - base64-encoded .jks keystore file
  #   ANDROID_KEYSTORE_PASSWORD      - keystore password
  #   ANDROID_KEY_ALIAS              - key alias
  #   ANDROID_KEY_PASSWORD           - key password
  #   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - contents of service account JSON
  # ─────────────────────────────────────────────
  android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload to Google Play Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          # Configure your app's package name below
          packageName: com.iotecksolutions.todoapp
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.jks android/key.properties

  # ─────────────────────────────────────────────
  # iOS → TestFlight
  # Required secrets:
  #   IOS_CERTIFICATES_P12_BASE64    - base64-encoded .p12 distribution certificate
  #   IOS_CERTIFICATES_P12_PASSWORD  - .p12 password
  #   IOS_PROVISIONING_PROFILE_BASE64 - base64-encoded .mobileprovision
  #   APP_STORE_CONNECT_API_KEY_ID   - App Store Connect API Key ID
  #   APP_STORE_CONNECT_API_ISSUER_ID - App Store Connect Issuer ID
  #   APP_STORE_CONNECT_API_KEY_BASE64 - base64-encoded .p8 API key
  # Prerequisites:
  #   - Set PRODUCT_BUNDLE_IDENTIFIER in Xcode → Runner target → Signing & Capabilities
  #   - Create a Distribution certificate and App Store provisioning profile in Apple Developer Portal
  #   - Create an API Key in App Store Connect → Users and Access → Integrations
  # ─────────────────────────────────────────────
  ios:
    name: Build & Distribute iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import distribution certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATES_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATES_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_CERTIFICATES_P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PP_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PP_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Set up App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            -o ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

      - name: Clean up keychain and keys
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
