name: Distribute (Dev)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [dev, test, staging, feature/21-ci/cd-pipeline]

jobs:
  # ─────────────────────────────────────────────
  # Android → Google Play Internal Track
  # Required secrets:
  #   ANDROID_KEYSTORE_BASE64        - base64-encoded .jks keystore file
  #   ANDROID_KEYSTORE_PASSWORD      - keystore password
  #   ANDROID_KEY_ALIAS              - key alias
  #   ANDROID_KEY_PASSWORD           - key password
  #   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - contents of service account JSON
  # ─────────────────────────────────────────────
  android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" > "$RUNNER_TEMP/keystore.b64"
          base64 --decode "$RUNNER_TEMP/keystore.b64" > android/app/release.jks


      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release --no-shrink

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: build/app/outputs/bundle/release/*.aab

      - name: Upload to Google Play Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          # Configure your app's package name below
          packageName: com.iotecksolutions.todoapp
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.jks android/key.properties

