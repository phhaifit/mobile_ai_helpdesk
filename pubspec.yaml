name: ai_helpdesk
description: "Jarvis Helpdesk - Omnichannel AI Helpdesk Platform"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.1
  mobx: ^2.6.0
  get_it: ^9.2.1
  flutter_mobx: ^2.3.0
  # State Management

  # Error Handling
  dartz: ^0.10.1

  # Networking
  dio: ^5.8.0+1
  http: ^1.4.0
  event_bus: ^2.0.0

  # Firebase & Analytics
  package_info_plus: ^8.0.0
  uuid: ^4.0.0

  # Local Storage
  sembast: ^3.7.5+1
  sembast_web: ^2.4.0+2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Encryption
  xxtea: ^2.1.0
  crypto: ^3.0.3

  # OAuth (Stack Auth — Google sign-in)
  # We use an in-app WebView (not Custom Tabs / ASWebAuthenticationSession)
  # because Stack Auth's whitelist only contains the HTTPS web redirect URL
  # `https://helpdesk.jarvis.cx/oauth2callback`, and routing that HTTPS URL
  # back to the mobile app would otherwise require deploying an
  # assetlinks.json / apple-app-site-association on helpdesk.jarvis.cx
  # (DevOps-side change we cannot make from the mobile project).
  webview_flutter: ^4.10.0

  # UI
  google_fonts: ^6.2.1
  another_flushbar: ^1.12.30
  flutter_markdown_plus: ^1.0.4
  file_picker: ^8.1.7

  # Serialization
  json_annotation: ^4.9.0
  firebase_core: ^4.5.0
  # Firebase packages
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  sentry_flutter: ^9.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.0
  build_runner: ^2.4.8
  mobx_codegen: ^2.5.0
  flutter_lints: ^5.0.0
  firebase_core_platform_interface: ^6.0.2
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/images/
