name: ai_helpdesk
description: "Jarvis Helpdesk - Omnichannel AI Helpdesk Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.8.0+1
  http: ^1.4.0
  event_bus: ^2.0.0

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  sembast: ^3.7.5+1
  sembast_web: ^2.4.0+2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Encryption
  xxtea: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
