name: ai_helpdesk
description: "Jarvis Helpdesk - Omnichannel AI Helpdesk Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  mobx: ^2.4.0
  flutter_mobx: ^2.2.1+1

  # Networking
  dio: ^5.8.0+1
  http: ^1.4.0
  event_bus: ^2.0.0

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  sembast: ^3.7.5+1
  sembast_web: ^2.4.0+2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Encryption
  xxtea: ^2.1.0

  # UI
  google_fonts: ^6.2.1
  another_flushbar: ^1.12.30

  # Serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  mobx_codegen: ^2.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
