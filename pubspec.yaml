name: ai_helpdesk
description: "Jarvis Helpdesk - Omnichannel AI Helpdesk Platform"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  mobx: ^2.6.0
  get_it: ^9.2.1
  flutter_mobx: ^2.3.0
  # State Management

  # Error Handling
  dartz: ^0.10.1

  # Networking
  dio: ^5.8.0+1
  http: ^1.4.0
  event_bus: ^2.0.0

  # Firebase & Analytics
  package_info_plus: ^8.0.0
  uuid: ^4.0.0

  # Local Storage
  sembast: ^3.7.5+1
  sembast_web: ^2.4.0+2
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1

  # Encryption
  xxtea: ^2.1.0

  # UI
  google_fonts: ^6.2.1
  another_flushbar: ^1.12.30
  flutter_markdown_plus: ^1.0.4
  file_picker: ^8.1.7

  # Serialization
  json_annotation: ^4.9.0
  firebase_core: ^4.5.0
  # Firebase packages
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  sentry_flutter: ^9.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.8
  json_serializable: ^6.9.0
  mobx_codegen: ^2.5.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/lang/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon/app_icon_1024.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/app_icon/app_icon_foreground_1024.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/splash/splash_logo_1024.png
  android_12:
    color: "#FFFFFF"
    image: assets/branding/splash/splash_logo_1024.png
  ios: true
  android: true
  web: false
