plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Load signing credentials from android/key.properties (never committed — see key.properties.example)
def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.jarvis.helpdesk"
    compileSdkVersion 36
    // jni plugin pulled by sentry_flutter requires this exact NDK build.
    ndkVersion "28.2.13676358"

    lintOptions {
        disable 'InvalidPackage'
    }

    defaultConfig {
        applicationId "com.jarvis.helpdesk"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // flutter_appauth: the custom URL scheme the Google Drive OAuth redirect
        // (Authorization Code + PKCE) comes back on. This is the *reversed*
        // Google Android OAuth client ID — i.e. the reversed form of
        // `368520637250-XXX.apps.googleusercontent.com`. ⚠️ Placeholder: update
        // this to the real value when DevOps issues the Android client ID, and
        // keep it in sync with `_androidClientId` in
        // lib/presentation/knowledge/add_source/google_drive_oauth_service.dart.
        manifestPlaceholders += [
            appAuthRedirectScheme: 'com.googleusercontent.apps.368520637250-XXX_ANDROID'
        ]
    }

    signingConfigs {
        release {
            // Credentials are injected via android/key.properties (local) or
            // decoded from GitHub Secrets in CI — see .github/workflows/distribute.yml
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        // Debug builds (flutter run) are signed with the SAME release keystore —
        // whenever android/key.properties is present — so local dev installs and
        // store/CI builds share one SHA-1 fingerprint (the one registered against
        // the Google OAuth Android client ID). Falls back to the stock Android
        // debug key when key.properties is absent (fresh clone without the keystore).
        debug {
            signingConfig keystoreProperties.containsKey('keyAlias')
                ? signingConfigs.release
                : signingConfigs.debug
        }
        release {
            signingConfig keystoreProperties.containsKey('keyAlias')
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }

    // Support Android 15+ devices with 16KB memory page size (required from API 35+)
    // Native .so libraries are stored uncompressed so the OS can map them directly
    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source '../..'
}

dependencies {
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test.ext:junit:1.1.1'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.0'
}
